<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FYP Attendance — Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="centered">
  <form id="login-form" class="card">
    <h1>Face Recognition Attendance System Demo</h1>
    <p class="muted">FYP-26-S2-17</p>
    <label>Email<input type="email" name="email" required value="alice@demo.local"></label>
    <label>Password<input type="password" name="password" required value="demo123"></label>
    <button type="submit">Login</button>
    <p id="login-error" class="error"></p>
    <p class="muted small">
      Demo accounts — admin@demo.local, alice@demo.local, bob@demo.local (password: <code>demo123</code>)
    </p>
  </form>
  <script src="app.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const err = document.getElementById("login-error");
      err.textContent = "";
      try {
        const res = await api("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: fd.get("email"), password: fd.get("password") }),
        });
        localStorage.setItem("token", res.token);
        localStorage.setItem("user", JSON.stringify(res.user));
        location.href = res.user.role === "admin" ? "admin.html" : "student.html";
      } catch (ex) {
        err.textContent = ex.message;
      }
    });
  </script>
</body>

</html>
