# Ruff configuration for FYP-26-S2-17.
# CI runs `ruff check ai api` — see .github/workflows/ci.yml

line-length = 120
target-version = "py311"

[lint.per-file-ignores]
# api/main_api.py deliberately manipulates sys.path before importing
